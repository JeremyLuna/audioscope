<html>
  <head>
    <title>Audioscope</title>

      <style>
        body {
          margin: 0;
          font-family: Arial, Helvetica, sans-serif;
          background: #000;
          color: #fff;
        }
        canvas {
          display: block;
          width: 100vw;
          height: 100vh;
        }
        .startup {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(0, 0, 0, 0.8);
          z-index: 10;
        }
        .startup__panel {
          max-width: 360px;
          width: 100%;
          padding: 24px;
          border: 1px solid #444;
          border-radius: 16px;
          background: rgba(16, 18, 25, 0.95);
          text-align: center;
        }
        .startup__panel h1 {
          margin: 0 0 12px;
          font-size: 1.8rem;
        }
        .startup__panel p {
          margin: 0 0 20px;
          color: #ddd;
        }
        .startup__panel button {
          width: 100%;
          margin: 8px 0;
          padding: 14px 18px;
          font-size: 1rem;
          color: #fff;
          background: #1976d2;
          border: none;
          border-radius: 12px;
          cursor: pointer;
        }
        .startup__panel button.secondary {
          background: #424242;
        }
        .startup__panel button:hover {
          opacity: 0.95;
        }
        .controls {
          position: fixed;
          left: 16px;
          right: 16px;
          bottom: 16px;
          padding: 12px 14px;
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 14px;
          background: rgba(8, 10, 14, 0.82);
          backdrop-filter: blur(8px);
          z-index: 20;
          transition: opacity 0.2s ease;
        }
        .controls--hidden {
          opacity: 0;
          pointer-events: none;
        }
        .controls--off {
          display: none;
        }
        .controls__row {
          display: flex;
          align-items: center;
          gap: 10px;
        }
        .controls__time {
          min-width: 90px;
          font-size: 0.9rem;
          color: #d6d6d6;
        }
        .controls__button {
          border: none;
          border-radius: 10px;
          background: #1976d2;
          color: #fff;
          min-width: 80px;
          padding: 10px 14px;
          font-size: 0.95rem;
          cursor: pointer;
        }
        .controls__button:hover {
          opacity: 0.95;
        }
        .controls__progress {
          width: 100%;
            margin: 0 0 12px;
        }
        .controls__volume {
          display: flex;
          align-items: center;
          gap: 8px;
          min-width: 140px;
          color: #d6d6d6;
          font-size: 0.9rem;
        }
        .controls__volume input {
          width: 100%;
        }
        input[type='range'] {
          accent-color: #50a8ff;
        }
        @media (max-width: 720px) {
          .controls {
            left: 10px;
            right: 10px;
            bottom: 10px;
            padding: 10px;
          }
          .controls__row {
            flex-wrap: wrap;
          }
          .controls__time {
            min-width: 0;
            flex: 1;
          }
          .controls__volume {
            width: 100%;
            min-width: 0;
          }
        }
      </style>
  </head>
  <body>
    <div id="startup" class="startup">
      <div class="startup__panel">
        <h1>Audioscope</h1>
        <p>Choose a source to start visualizing audio.</p>
        <button id="use-mic">Use microphone</button>
        <button id="use-file" class="secondary">Upload music file</button>
        <input id="file-input" type="file" accept="audio/*" hidden>
      </div>
    </div>
    <canvas id="c"></canvas>
    <div id="controls" class="controls controls--off controls--hidden" aria-live="polite">
      <input id="progress-slider" class="controls__progress" type="range" min="0" max="1000" value="0" step="1" aria-label="Playback position">
      <div class="controls__row">
        <button id="play-pause" class="controls__button" type="button">Pause</button>
        <span id="time-label" class="controls__time">00:00 / 00:00</span>
        <label class="controls__volume" for="volume-slider">
          Volume
          <input id="volume-slider" type="range" min="0" max="100" step="1" value="100" aria-label="Volume">
        </label>
      </div>
    </div>
    <script src="bundle.js"></script>
  </body>
</html>
